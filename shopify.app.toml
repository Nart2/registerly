# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "Registerly"
client_id = "73f248c289b0fbb52a0be5e790bf503c"
application_url = "https://registerly.onrender.com"
embedded = true

[access_scopes]
scopes = "read_products,read_orders"

[auth]
redirect_urls = [ "https://registerly.onrender.com/auth/callback" ]

[webhooks]
api_version = "2024-10"

[[webhooks.subscriptions]]
topics = [ "orders/paid" ]
uri = "/webhooks"

[[webhooks.subscriptions]]
topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/webhooks"

[app_proxy]
subpath = "registerly"
prefix = "apps"
url = "https://registerly.onrender.com"

[pos]
embedded = false
