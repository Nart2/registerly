services:
  - type: web
    name: registerly
    runtime: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npx remix-serve ./build/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_products,read_orders,write_orders
      - key: HOST
        sync: false
      - key: APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
